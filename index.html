<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Portfolio PWA</title>

    <!-- HUBUNGKAN KE PWA MANIFEST[cite: 1, 4] -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1d2b64">
    
    <!-- KONFIGURASI AGAR FULLSCREEN DI SMARTPHONE[cite: 4] -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image.png">

    <!-- JQUERY UNTUK LOGIKA GITHUB INFO[cite: 2] -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        /* CSS DASAR & GLASSMORPHISM[cite: 4] */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background: linear-gradient(135deg,#1d2b64,#f8cdda);
            min-height:100vh;
        }

        /* NAVBAR STICKY[cite: 4] */
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 20px;
            backdrop-filter: blur(15px);
            position:sticky;
            top:0;
            z-index:1000;
            background: rgba(255, 255, 255, 0.1);
        }

        .logo{
            color:white;
            font-weight:bold;
            font-size:18px;
        }

        .menu{
            display:flex;
            gap:10px;
        }

        .menu button{
            padding:8px 14px;
            border:none;
            border-radius:20px;
            background:rgba(255,255,255,0.2);
            color:white;
            cursor:pointer;
            transition:0.3s;
        }

        .menu button:hover, .menu button.active{
            background:white;
            color:#333;
        }

        .hamburger{
            display:none;
            flex-direction:column;
            cursor:pointer;
        }

        .hamburger div{
            width:25px;
            height:3px;
            background:white;
            margin:4px;
        }

        /* CONTAINER KONTEN[cite: 4] */
        #content{
            max-width:900px;
            margin:20px auto;
            background:rgba(255,255,255,0.9);
            padding:25px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            min-height:300px;
            animation:fade 0.4s;
        }

        @keyframes fade{
            from{opacity:0; transform:translateY(10px);}
            to{opacity:1;}
        }

        /* RESPONSIVE MENU UNTUK SMARTPHONE[cite: 4] */
        @media(max-width:768px){
            .menu{
                position:absolute;
                top:60px;
                left:0;
                width:100%;
                background:rgba(0,0,0,0.9);
                flex-direction:column;
                display:none;
                padding:10px;
            }
            .menu.show{
                display:flex;
            }
            .menu button{
                width:100%;
            }
            .hamburger{
                display:flex;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">My CV PWA</div>

    <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="menu" id="menu">
        <button class="active" onclick="loadPage('home')">Home</button>
        <button onclick="loadPage('skills')">Skills</button>
        <button onclick="loadPage('portfolio')">Portfolio</button>
        <button onclick="loadPage('github')">GitHub</button>
    </div>
</div>

<div id="content">
    <!-- Konten Default -->
    <h2 style="text-align:center;">Welcome</h2>
    <p style="text-align:center;">Silakan pilih menu. CV ini sudah mendukung PWA.</p>
</div>

<script>
    // 1. REGISTRASI SERVICE WORKER UNTUK PWA[cite: 4, 9]
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service Worker: Terdaftar'))
                .catch(err => console.error('Service Worker: Gagal', err));
        });
    }

    // 2. LOGIKA MENU HAMBURGER[cite: 4]
    document.getElementById('hamburger').addEventListener('click', function() {
        document.getElementById('menu').classList.toggle('show');
    });

    // 3. LOGIKA NAVIGASI KONTEN (SPA STYLE)[cite: 4]
    function loadPage(page){
        let content = document.getElementById('content');
        
        // Menutup menu mobile setelah klik
        document.getElementById('menu').classList.remove('show');
        
        // Mengganti tombol aktif
        document.querySelectorAll('.menu button').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Menampilkan konten berdasarkan halaman[cite: 2, 3, 6, 8]
        if(page === 'home'){
            content.innerHTML = `
                <div style="text-align:center;">
                    <img src="image.png" style="width:130px; height:130px; border-radius:50%; border:4px solid #fff; box-shadow:0 5px 15px rgba(0,0,0,0.2);">
                    <h3>Ahmad Fauzi</h3>
                    <p>Mahasiswa pengembang web dan desain UI/UX.</p>
                </div>`;
        } else if(page === 'skills'){
            content.innerHTML = `
                <h2>Skills</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 10px;">
                    <div style="padding:20px; background:#46a3a7; color:white; text-align:center; border-radius:10px;">HTML</div>
                    <div style="padding:20px; background:#46a3a7; color:white; text-align:center; border-radius:10px;">CSS</div>
                    <div style="padding:20px; background:#46a3a7; color:white; text-align:center; border-radius:10px;">JavaScript</div>
                </div>`;
        } else if(page === 'portfolio'){
            content.innerHTML = `
                <h2>Portfolio</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px;">
                    <div style="padding: 20px; background: #2fc989; border-radius: 10px; text-align: center;">Project CV PWA</div>
                    <div style="padding: 20px; background: #2fc989; border-radius: 10px; text-align: center;">Inventory System</div>
                </div>`;
        } else if(page === 'github'){
            content.innerHTML = `<h2>GitHub Info</h2><p>Loading data...</p>`;
            // Logika fetch GitHub bisa ditambahkan di sini[cite: 2]
        }
    }
</script>

</body>
</html>
