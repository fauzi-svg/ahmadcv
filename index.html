<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Portfolio PWA</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1d2b64">
    <link rel="apple-touch-icon" href="image.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background: linear-gradient(135deg,#1d2b64,#f8cdda);
            min-height:100vh;
        }

        /* NAVBAR */
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 20px;
            backdrop-filter: blur(15px);
            position:sticky;
            top:0;
            z-index:1000;
            background: rgba(255, 255, 255, 0.1);
        }

        .logo{
            color:white;
            font-weight:bold;
            font-size:18px;
        }

        .menu{
            display:flex;
            gap:10px;
        }

        .menu button{
            padding:8px 14px;
            border:none;
            border-radius:20px;
            background:rgba(255,255,255,0.2);
            color:white;
            cursor:pointer;
            transition:0.3s;
        }

        .menu button:hover, .menu button.active{
            background:white;
            color:#333;
        }

        /* HAMBURGER */
        .hamburger{
            display:none;
            flex-direction:column;
            cursor:pointer;
        }

        .hamburger div{
            width:25px;
            height:3px;
            background:white;
            margin:4px;
        }

        /* CONTENT */
        #content{
            max-width:900px;
            margin:20px auto;
            background:rgba(255,255,255,0.9);
            padding:25px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            min-height:300px;
            animation:fade 0.4s;
        }

        @keyframes fade{
            from{opacity:0; transform:translateY(10px);}
            to{opacity:1;}
        }

        /* MOBILE */
        @media(max-width:768px){
            .menu{
                position:absolute;
                top:60px;
                left:0;
                width:100%;
                background:rgba(0,0,0,0.9);
                flex-direction:column;
                display:none;
                padding:10px;
            }
            .menu.show{
                display:flex;
            }
            .menu button{
                width:100%;
            }
            .hamburger{
                display:flex;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">My CV PWA</div>

    <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="menu" id="menu">
        <button id="homeBtn" class="active">Home</button>
        <button id="aboutBtn">About</button>
        <button id="contactBtn">Contact</button>
        <button id="skillsBtn">Skills</button>
    </div>
</div>

<div id="content">
    <h2 style="text-align:center;">Welcome</h2>
    <p style="text-align:center;">Silakan pilih menu. CV ini sudah mendukung PWA.</p>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker terdaftar'))
                .catch(err => console.error('Registrasi gagal', err));
        });
    }

    // Toggle Menu Mobile
    document.getElementById('hamburger').addEventListener('click', function() {
        document.getElementById('menu').classList.toggle('show');
    });
</script>

<script src="app.js"></script>

</body>
</html>
